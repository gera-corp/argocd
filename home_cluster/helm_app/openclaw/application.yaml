# Application manifest
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
spec:
  destination:
    name: in-cluster
    namespace: openclaw
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  source:
    repoURL: 'https://serhanekicii.github.io/openclaw-helm'
    chart: openclaw
    targetRevision: 1.5.*
    helm:
      skipCrds: false
      valuesObject:
        app-template:
          configMode: merge
          configMaps:
            config:
              data:
                openclaw.json: |
                  {
                    "gateway": {
                      "port": 18789,
                      "mode": "local"
                    },
                    "browser": {
                      "enabled": true,
                      "defaultProfile": "default",
                      "profiles": {
                        "default": {
                          "cdpUrl": "http://localhost:9222"
                        }
                      }
                    },
                    "agents": {
                      "defaults": {
                        "model": {
                          "primary": "anthropic/claude-opus-4-7"
                        },
                        "workspace": "/home/node/.openclaw/workspace"
                      }
                    },
                    "logging": {
                      "level": "info"
                    }
                  }
          controllers:
            main:
              containers:
                main:
                  envFrom:
                    - secretRef:
                        name: openclaw-env-secret
                  resources:
                    requests:
                      # @schema type:string;default:200m
                      cpu: 200m
                      # @schema type:string;default:512Mi
                      memory: 512Mi
                    limits:
                      # @schema type:string;default:2000m
                      cpu: 2000m
                      # @schema type:string;default:2Gi
                      memory: 4Gi
